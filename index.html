<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
<script>
const {useState,useRef,useEffect,useCallback} = React;
const h = React.createElement;

const C = {
  bg:'#0F0F0F',surface:'#171717',card:'#1E1E1E',border:'#2A2A2A',
  accent:'#C8A96E',accentDim:'#8B6F3E',text:'#E8E4DC',muted:'#6B6560',
  success:'#4CAF82',warn:'#E8834A',danger:'#E05252',blue:'#7B9FD4'
};
const SITE_PASSWORD = 'mts2025';

// ── System prompt ─────────────────────────────────────────────────────────────
const MTS_PROMPT = 'You are a meeting summary assistant for Momen Tax Services (MTS). Your job is to read a meeting transcript and/or agenda and produce a formatted meeting summary.\n\nROLE & CONTEXT\n- All meetings are hosted by Jasmine Hajimomen (founder)\n- Kevina Tweddle: client onboarding specialist; sends engagement letters and follow-up emails\n- Emely: client communications and implementation\n- Danny: accounting and payroll setup\n- Atenas: internal operations, payroll backdating\n- Tools: Canopy (CRM), QuickBooks, ADP, GoHighLevel, Notion\n- Clients may have multiple entities — treat each separately\n\nSUMMARY STRUCTURE:\n1. Notes/Questions — answers only, never restate the question\n2. Client Next Steps\n3. MTS Tasks — prefix with owner name (Danny:, Kevina:, etc.)\n4. Suggested Next Meeting Agenda — max 5, forward-looking\n5. Follow-Up Email\n\nEMAIL RULES\n- Open: "Hi [Name], Thank you for your time in meeting with Jasmine yesterday."\n- MTS action paragraph, client action list (bullets <5, numbered 5+)\n- Final: "As always, please don\'t hesitate to reach out — we are always an email or phone call away."\n- Sign: Warm regards / [Sender] / [Title] / Momen Tax Services\n- Default sender: Kevina Tweddle / Client Onboarding Specialist\n- No em dashes\n\nOUTPUT: Respond ONLY with valid JSON, no markdown fences:\n{"clientName":"string","meetingDate":"string","meetingType":"string","hostedBy":"Momen Tax Services","attendees":"string","summary":"string","notesAndQuestions":["string"],"clientNextSteps":["string"],"mtsTasks":["string"],"nextAgenda":["string"],"followUpEmail":{"subject":"string","body":"string"},"flags":["string"],"ghostItems":["string"],"clientProfile":{"phone":"string or Unknown","email":"string or Unknown","businesses":["string"],"industry":"string or Unknown","filingStatus":"string or Unknown","spouse":"string or Unknown","serviceType":"string or Unknown","lastMeetingDate":"string or Unknown","notes":"2-3 sentence plain text overview, no labels"}}';

// ── Supabase ──────────────────────────────────────────────────────────────────
const SB_URL = 'https://ykowuicymemzrhhfaiqz.supabase.co';
function sbH(k){
  if(!k) console.error('Supabase key is empty!');
  return{'apikey':k,'Authorization':'Bearer '+k,'Content-Type':'application/json','Prefer':'return=representation'};
}
async function sbGet(table,params,k){
  var url=SB_URL+'/rest/v1/'+table+'?';
  var qp=Object.entries(params||{}).map(function(e){return e[0]+'='+encodeURIComponent(e[1]);}).join('&');
  var r=await fetch(url+qp,{headers:sbH(k)});
  if(!r.ok) throw new Error('DB error '+r.status);
  return r.json();
}
async function sbPost(table,data,k){
  var r=await fetch(SB_URL+'/rest/v1/'+table,{method:'POST',headers:sbH(k),body:JSON.stringify(data)});
  if(!r.ok) throw new Error('DB error '+r.status);
  var res=await r.json();
  return Array.isArray(res)?res[0]:res;
}
async function sbPatch(table,data,match,k){
  var url=SB_URL+'/rest/v1/'+table+'?';
  var qp=Object.entries(match).map(function(e){return e[0]+'=eq.'+encodeURIComponent(e[1]);}).join('&');
  var r=await fetch(url+qp,{method:'PATCH',headers:sbH(k),body:JSON.stringify(data)});
  if(!r.ok) throw new Error('DB error '+r.status);
  return r.json();
}
async function sbDelete(table,match,k){
  var url=SB_URL+'/rest/v1/'+table+'?';
  var qp=Object.entries(match).map(function(e){return e[0]+'=eq.'+encodeURIComponent(e[1]);}).join('&');
  var r=await fetch(url+qp,{method:'DELETE',headers:sbH(k)});
  if(!r.ok) throw new Error('DB error '+r.status);
}

// ── Storage ───────────────────────────────────────────────────────────────────
const getApiKey = ()=>localStorage.getItem('mts_ak')||'';
const saveApiKey = k=>localStorage.setItem('mts_ak',k);
const getSbKey = ()=>localStorage.getItem('mts_sb')||'';
const saveSbKey = k=>localStorage.setItem('mts_sb',k);
const getView = ()=>sessionStorage.getItem('mts_view')||'home';
const setViewSS = v=>sessionStorage.setItem('mts_view',v);
const getDetailClient = ()=>sessionStorage.getItem('mts_dc')||'';
const setDetailClientSS = n=>{if(n)sessionStorage.setItem('mts_dc',n);else sessionStorage.removeItem('mts_dc');};

// ── Claude API ────────────────────────────────────────────────────────────────
async function runAgent(transcript,history,apiKey){
  var histCtx=history&&history.sessions&&history.sessions.length
    ?'\n\nCLIENT HISTORY:\n'+JSON.stringify(history.sessions.slice(-3),null,2)+'\nProfile: '+JSON.stringify(history.profile||{})
    :'';
  var r=await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
    body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:4000,system:MTS_PROMPT,
      messages:[{role:'user',content:'Process this and return ONLY the JSON.'+histCtx+'\n\nTRANSCRIPT:\n'+transcript.slice(0,12000)}]})
  });
  var data=await r.json();
  if(data.error) throw new Error(data.error.message);
  var fence=String.fromCharCode(96,96,96);
  var raw=data.content[0].text.split(fence+'json').join('').split(fence).join('').trim();
  return JSON.parse(raw);
}

async function runAgenda(clientName,history,apiKey){
  var lastSession=history&&history.sessions&&history.sessions.length?history.sessions.slice(-1)[0]:null;
  var openItems=history&&history.openItems?history.openItems:[];
  var ctx='Client: '+clientName+'\nService: '+(history&&history.profile&&history.profile.serviceType||'Unknown')+
    '\nOpen items: '+openItems.join('; ')+
    '\nLast meeting: '+(lastSession?lastSession.date+' — '+lastSession.summary:'No prior sessions');
  var r=await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
    body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:800,system:MTS_PROMPT,
      messages:[{role:'user',content:'Build a pre-meeting agenda for: '+clientName+'\n\nCONTEXT:\n'+ctx+'\n\nReturn a clean numbered agenda (max 7 items), plain text only. Lead with open items.'}]})
  });
  var data=await r.json();
  if(data.error) throw new Error(data.error.message);
  return data.content[0].text;
}

async function runProfileGen(clientName,data,apiKey){
  var sessions=data.sessions||[];
  if(!sessions.length) return null;
  var ctx=sessions.map(function(s,i){return 'Session '+(i+1)+' ('+s.date+'): '+(s.summary||'');}).join('\n');
  var fence=String.fromCharCode(96,96,96);
  var prompt='You are a tax advisory assistant for Momen Tax Services. Based on the session history for client "'+clientName+'", extract the following and respond ONLY with valid JSON, no markdown fences:\n{"notes":"2-3 sentence plain text overview starting with the client name","phone":"string or Unknown","email":"string or Unknown","businesses":["list of business names"],"industry":"string or Unknown","filingStatus":"string or Unknown","spouse":"string or Unknown","serviceType":"string or Unknown"}\n\nSESSIONS:\n'+ctx;
  var r=await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
    body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:600,messages:[{role:'user',content:prompt}]})
  });
  var d=await r.json();
  if(d.error) throw new Error(d.error.message);
  var raw=d.content[0].text.split(fence+'json').join('').split(fence).join('').trim();
  return JSON.parse(raw);
}

// ── Format for copy ───────────────────────────────────────────────────────────
function formatForCopy(r,clientName){
  var lines=['MEETING SUMMARY — '+(r.meetingType||'Advisory Meeting'),'Client: '+(clientName||r.clientName||''),'Date: '+(r.meetingDate||''),'Hosted By: '+(r.hostedBy||'Momen Tax Services'),''];
  if(r.notesAndQuestions&&r.notesAndQuestions.length){lines.push('NOTES / QUESTIONS');r.notesAndQuestions.forEach(function(i){lines.push('• '+i);});lines.push('');}
  if(r.clientNextSteps&&r.clientNextSteps.length){lines.push('CLIENT NEXT STEPS');r.clientNextSteps.forEach(function(i){lines.push('• '+i);});lines.push('');}
  if(r.mtsTasks&&r.mtsTasks.length){lines.push('MTS TASKS');r.mtsTasks.forEach(function(i){lines.push('• '+i);});lines.push('');}
  if(r.nextAgenda&&r.nextAgenda.length){lines.push('SUGGESTED NEXT AGENDA');r.nextAgenda.forEach(function(i){lines.push('• '+i);});lines.push('');}
  if(r.flags&&r.flags.length){lines.push('FLAGS & WATCH ITEMS');r.flags.forEach(function(i){lines.push('• '+i);});lines.push('');}
  if(r.followUpEmail){lines.push('FOLLOW-UP EMAIL');lines.push('Subject: '+r.followUpEmail.subject);lines.push('');lines.push(r.followUpEmail.body||'');}
  return lines.join('\n');
}

// ── UI Atoms ──────────────────────────────────────────────────────────────────
function Tag({color,children}){return h('span',{style:{background:color+'22',color,border:'1px solid '+color+'44',borderRadius:4,padding:'2px 8px',fontSize:11,fontWeight:600,letterSpacing:'0.05em',textTransform:'uppercase'}},children);}

function Btn({onClick,disabled,variant,small,children,style:s={}}){
  variant=variant||'primary';
  var base={border:'none',borderRadius:6,cursor:disabled?'not-allowed':'pointer',fontWeight:600,fontFamily:'inherit',...s};
  var v={
    primary:{background:disabled?C.accentDim:C.accent,color:C.bg,padding:small?'5px 14px':'10px 28px',fontSize:small?12:13},
    ghost:{background:'transparent',color:C.muted,border:'1px solid '+C.border,padding:small?'4px 12px':'6px 16px',fontSize:small?11:12},
    danger:{background:C.danger+'18',color:C.danger,border:'1px solid '+C.danger+'44',padding:'4px 12px',fontSize:11},
    nav:{background:C.card,color:C.text,border:'1px solid '+C.border,borderRadius:10,padding:'16px 20px',fontSize:13,fontWeight:600,textAlign:'left',width:'100%'},
  };
  return h('button',{onClick,disabled,style:{...base,...v[variant]}},children);
}

function CopyBtn({getText,label}){
  var [copied,setCopied]=useState(false);
  return h('button',{onClick:function(){navigator.clipboard.writeText(getText());setCopied(true);setTimeout(function(){setCopied(false);},2000);},
    style:{background:copied?C.success+'22':C.accentDim,color:copied?C.success:'#fff',border:copied?'1px solid '+C.success+'44':'none',borderRadius:6,padding:'5px 14px',fontSize:12,fontWeight:600,cursor:'pointer',fontFamily:'inherit'}},
    copied?'Copied!':(label||'Copy'));
}

function Section({icon,title,items,accent,checkable,checked,onCheck}){
  checked=checked||[];
  if(!items||!items.length) return null;
  return h('div',{style:{marginBottom:22}},
    h('div',{style:{display:'flex',alignItems:'center',gap:8,marginBottom:10}},
      icon&&h('span',null,icon),
      h('span',{style:{fontFamily:"'Playfair Display',serif",fontSize:12,color:accent||C.accent,fontWeight:600,letterSpacing:'0.1em',textTransform:'uppercase'}},title)
    ),
    h('div',{style:{display:'flex',flexDirection:'column',gap:5}},
      items.map(function(item,i){
        return h('div',{key:i,onClick:checkable?function(){onCheck(i);}:undefined,
          style:{display:'flex',gap:10,padding:'8px 12px',background:C.surface,borderRadius:6,borderLeft:'2px solid '+(accent||C.accent)+'44',cursor:checkable?'pointer':'default',opacity:checked.indexOf(i)>=0?0.38:1,textDecoration:checked.indexOf(i)>=0?'line-through':'none'}},
          h('span',{style:{color:accent||C.accentDim,fontSize:11,marginTop:2,flexShrink:0}},String(i+1).padStart(2,'0')),
          h('span',{style:{color:C.text,fontSize:13,lineHeight:1.6}},item)
        );
      })
    ),
    checkable&&h('div',{style:{color:C.muted,fontSize:11,marginTop:5}},'Click to mark complete')
  );
}

function EmailBlock({email}){
  var [copied,setCopied]=useState(false);
  if(!email) return null;
  var full='Subject: '+email.subject+'\n\n'+email.body;
  return h('div',{style:{marginBottom:22}},
    h('div',{style:{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:10}},
      h('span',{style:{fontFamily:"'Playfair Display',serif",fontSize:12,color:C.accent,fontWeight:600,letterSpacing:'0.1em',textTransform:'uppercase'}},'Follow-Up Email'),
      h('button',{onClick:function(){navigator.clipboard.writeText(full);setCopied(true);setTimeout(function(){setCopied(false);},2000);},
        style:{background:copied?C.success+'18':C.accentDim,color:copied?C.success:'#fff',border:copied?'1px solid '+C.success+'44':'none',borderRadius:6,padding:'5px 14px',fontSize:12,fontWeight:600,cursor:'pointer',fontFamily:'inherit'}},
        copied?'Copied':'Copy Email')
    ),
    h('div',{style:{background:C.surface,borderRadius:8,padding:18,border:'1px solid '+C.border}},
      h('div',{style:{color:C.accent,fontSize:11,fontWeight:700,marginBottom:10}},'SUBJECT: '+email.subject),
      h('pre',{style:{color:C.text,fontSize:13,lineHeight:1.75,whiteSpace:'pre-wrap',fontFamily:'inherit'}},email.body)
    )
  );
}

// ── Session Card ──────────────────────────────────────────────────────────────
function EditableList({items,onChange}){
  return h('div',{style:{display:'flex',flexDirection:'column',gap:4}},
    (items||[]).map(function(item,i){
      return h('div',{key:i,style:{display:'flex',gap:6,alignItems:'flex-start'}},
        h('textarea',{value:item,rows:2,onChange:function(e){var n=items.slice();n[i]=e.target.value;onChange(n);},
          style:{flex:1,background:C.bg,border:'1px solid '+C.border,borderRadius:4,padding:'5px 8px',color:C.text,fontSize:12,fontFamily:'inherit',resize:'vertical'}}),
        h('button',{onClick:function(){onChange(items.filter(function(_,j){return j!==i;}));},
          style:{background:'none',border:'none',color:C.danger,cursor:'pointer',fontSize:16,padding:'4px',flexShrink:0}},'x')
      );
    }),
    h('button',{onClick:function(){onChange((items||[]).concat(['']));},
      style:{background:'transparent',border:'1px dashed '+C.border,borderRadius:4,padding:'4px 10px',color:C.muted,fontSize:11,cursor:'pointer',fontFamily:'inherit',textAlign:'left',marginTop:2}},
      '+ Add item')
  );
}

function SessionCard({session:s,index,total,clientName,onSave,onDelete}){
  var [open,setOpen]=useState(index===0);
  var [editing,setEditing]=useState(false);
  var [draft,setDraft]=useState(null);
  function startEdit(){setDraft(JSON.parse(JSON.stringify(s)));setEditing(true);setOpen(true);}
  function cancelEdit(){setEditing(false);setDraft(null);}
  function saveEdit(){onSave(draft);setEditing(false);setDraft(null);}
  function upd(key,val){setDraft(function(p){var n=Object.assign({},p);n[key]=val;return n;});}
  function updEmail(key,val){setDraft(function(p){var n=Object.assign({},p);n.followUpEmail=Object.assign({},p.followUpEmail||{});n.followUpEmail[key]=val;return n;});}
  var cur=editing?draft:s;
  return h('div',{style:{background:C.card,border:'1px solid '+(editing?C.accent:C.border),borderRadius:10,marginBottom:10,overflow:'hidden'}},
    h('div',{style:{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'14px 18px',userSelect:'none'}},
      h('div',{style:{display:'flex',alignItems:'center',gap:10,flexWrap:'wrap',flex:1,cursor:editing?'default':'pointer'},onClick:function(){if(!editing)setOpen(function(o){return !o;});}},
        editing
          ?h('div',{style:{display:'flex',gap:8,flexWrap:'wrap'}},
              h('input',{value:draft.date||'',onChange:function(e){upd('date',e.target.value);},onClick:function(e){e.stopPropagation();},placeholder:'Date',
                style:{background:C.surface,border:'1px solid '+C.border,borderRadius:4,padding:'3px 8px',color:C.accent,fontSize:13,fontWeight:600,fontFamily:'inherit',width:160}}),
              h('input',{value:draft.meetingType||'',onChange:function(e){upd('meetingType',e.target.value);},onClick:function(e){e.stopPropagation();},placeholder:'Meeting type',
                style:{background:C.surface,border:'1px solid '+C.border,borderRadius:4,padding:'3px 8px',color:C.text,fontSize:12,fontFamily:'inherit',width:160}})
            )
          :h('div',{style:{display:'flex',alignItems:'center',gap:10,flexWrap:'wrap'}},
              h('span',{style:{color:C.accent,fontSize:13,fontWeight:600}},s.date),
              s.meetingType&&h(Tag,{color:C.accent},s.meetingType),
              s.flags&&s.flags.length>0&&h(Tag,{color:C.warn},s.flags.length+' flag'+(s.flags.length>1?'s':''))
            )
      ),
      h('div',{style:{display:'flex',alignItems:'center',gap:8,flexShrink:0}},
        !editing&&h(Tag,{color:C.muted},'Session '+(total-index)),
        !editing&&h(CopyBtn,{getText:function(){return formatForCopy(s,clientName);},label:'Copy'}),
        editing
          ?h('div',{style:{display:'flex',gap:6}},
              h('button',{onClick:saveEdit,style:{background:C.accent,color:C.bg,border:'none',borderRadius:4,padding:'4px 12px',fontSize:11,fontWeight:700,cursor:'pointer',fontFamily:'inherit'}},'Save'),
              h('button',{onClick:cancelEdit,style:{background:'transparent',border:'1px solid '+C.border,borderRadius:4,padding:'4px 10px',fontSize:11,color:C.muted,cursor:'pointer',fontFamily:'inherit'}},'Cancel')
            )
          :h('div',{style:{display:'flex',gap:6}},
              h('button',{onClick:function(e){e.stopPropagation();startEdit();},style:{background:'transparent',border:'1px solid '+C.border,borderRadius:4,padding:'3px 10px',color:C.muted,fontSize:11,cursor:'pointer',fontFamily:'inherit'}},'Edit'),
              h('button',{onClick:function(e){e.stopPropagation();if(confirm('Delete this session?'))onDelete();},style:{background:'transparent',border:'1px solid '+C.danger+'44',borderRadius:4,padding:'3px 10px',color:C.danger,fontSize:11,cursor:'pointer',fontFamily:'inherit'}},'Delete')
            ),
        !editing&&h('span',{onClick:function(){setOpen(function(o){return !o;});},style:{color:C.muted,fontSize:14,marginLeft:4,cursor:'pointer'}},open?'▲':'▼')
      )
    ),
    !open&&!editing&&h('div',{style:{padding:'0 18px 14px',color:C.muted,fontSize:12,lineHeight:1.5}},
      (s.summary||'').slice(0,120)+((s.summary||'').length>120?'...':'')),
    open&&h('div',{style:{padding:'0 18px 18px',borderTop:'1px solid '+C.border}},
      h('div',{style:{marginBottom:14,marginTop:14}},
        h('div',{style:{color:C.muted,fontSize:11,fontWeight:700,letterSpacing:'0.06em',marginBottom:6}},'SUMMARY'),
        editing?h('textarea',{value:draft.summary||'',rows:3,onChange:function(e){upd('summary',e.target.value);},
          style:{width:'100%',background:C.surface,border:'1px solid '+C.border,borderRadius:6,padding:'8px 10px',color:C.text,fontSize:13,fontFamily:'inherit',lineHeight:1.6,resize:'vertical'}})
          :h('p',{style:{color:C.text,fontSize:13,lineHeight:1.65,margin:0}},s.summary)
      ),
      (editing||(s.flags&&s.flags.length>0))&&h('div',{style:{marginBottom:12}},
        h('div',{style:{color:C.warn,fontSize:11,fontWeight:700,letterSpacing:'0.06em',marginBottom:6}},'FLAGS'),
        editing?h(EditableList,{items:draft.flags||[],onChange:function(v){upd('flags',v);}})
          :(s.flags||[]).map(function(f,j){return h('div',{key:j,style:{color:C.text,fontSize:12,padding:'3px 0'}},f);})
      ),
      (editing||(s.notesAndQuestions&&s.notesAndQuestions.length>0))&&h('div',{style:{marginBottom:12}},
        h('div',{style:{color:C.muted,fontSize:11,fontWeight:700,letterSpacing:'0.06em',marginBottom:6}},'NOTES & QUESTIONS'),
        editing?h(EditableList,{items:draft.notesAndQuestions||[],onChange:function(v){upd('notesAndQuestions',v);}})
          :(s.notesAndQuestions||[]).map(function(n,j){return h('div',{key:j,style:{color:C.text,fontSize:12,padding:'3px 0',borderBottom:j<s.notesAndQuestions.length-1?'1px solid '+C.border:'none'}},'- '+n);})
      ),
      (editing||(s.clientNextSteps&&s.clientNextSteps.length>0))&&h('div',{style:{marginBottom:12}},
        h('div',{style:{color:C.success,fontSize:11,fontWeight:700,letterSpacing:'0.06em',marginBottom:6}},'CLIENT NEXT STEPS'),
        editing?h(EditableList,{items:draft.clientNextSteps||[],onChange:function(v){upd('clientNextSteps',v);}})
          :(s.clientNextSteps||[]).map(function(t,j){return h('div',{key:j,style:{color:C.text,fontSize:12,padding:'3px 0'}},t);})
      ),
      (editing||(s.mtsTasks&&s.mtsTasks.length>0))&&h('div',{style:{marginBottom:12}},
        h('div',{style:{color:C.accent,fontSize:11,fontWeight:700,letterSpacing:'0.06em',marginBottom:6}},'MTS TASKS'),
        editing?h(EditableList,{items:draft.mtsTasks||[],onChange:function(v){upd('mtsTasks',v);}})
          :(s.mtsTasks||[]).map(function(t,j){return h('div',{key:j,style:{color:C.text,fontSize:12,padding:'3px 0'}},'- '+t);})
      ),
      (editing||s.followUpEmail)&&h('div',{style:{marginBottom:12}},
        h('div',{style:{color:C.muted,fontSize:11,fontWeight:700,letterSpacing:'0.06em',marginBottom:6}},'FOLLOW-UP EMAIL'),
        editing?h('div',null,

function App(){
  var [unlocked,setUnlocked]=useState(function(){return localStorage.getItem('mts_unlocked')==='true';});
  var [apiKey,setApiKey]=useState(function(){return getApiKey();});
  var [sbKey,setSbKey]=useState(function(){return getSbKey();});

  var [view,setView]=useState(function(){return getView();});
  var [clients,setClients]=useState([]);
  var [recentSessions,setRecentSessions]=useState([]);
  var [homeLoading,setHomeLoading]=useState(false);

  // New meeting
  var [transcript,setTranscript]=useState('');
  var [result,setResult]=useState(null);
  var [status,setStatus]=useState('idle');
  var [errorMsg,setErrorMsg]=useState('');
  var [checkedC,setCheckedC]=useState([]);
  var [checkedM,setCheckedM]=useState([]);
  var resultRef=useRef(null);

  // Agenda
  var [agendaClient,setAgendaClient]=useState('');
  var [agendaResult,setAgendaResult]=useState('');
  var [agendaLoading,setAgendaLoading]=useState(false);

  // Client detail
  var [detailClient,setDetailClient]=useState(function(){return getDetailClient();});
  var [detailData,setDetailData]=useState(null);
  var [detailBizzes,setDetailBizzes]=useState([]);
  var [clientSearch,setClientSearch]=useState('');
  var [editingProfile,setEditingProfile]=useState(false);
  var [profileDraft,setProfileDraft]=useState({});
  var [generatingProfile,setGeneratingProfile]=useState(false);
  var [editingName,setEditingName]=useState(false);
  var [nameDraft,setNameDraft]=useState('');
  var [detailLoading,setDetailLoading]=useState(false);
  var [addingBiz,setAddingBiz]=useState(false);
  var [newBiz,setNewBiz]=useState({name:''});

  function nav(v){setView(v);setViewSS(v);}
  function navClient(name,data){setDetailClient(name);setDetailClientSS(name);setDetailData(data);setProfileDraft(data&&data.profile?data.profile:{});setEditingProfile(false);setEditingName(false);}

  // Load home data
  useEffect(function(){
    if(view==='home'){loadHomeData();}
  },[view,sbKey]);

  async function loadHomeData(){
    setHomeLoading(true);
    var key=getSbKey();
    try{
      var cls=await sbGet('clients',{order:'updated_at.desc',select:'name,profile',limit:'20'},key);
      setClients((cls||[]).map(function(c){return c.name;}));
      var sess=await sbGet('sessions',{order:'created_at.desc',select:'client_name,meeting_date,meeting_type,summary',limit:'5'},key);
      setRecentSessions(sess||[]);
    }catch(e){console.error(e);}
    setHomeLoading(false);
  }

  // Load clients list
  useEffect(function(){
    if(view==='clients'&&!detailClient){
      sbGet('clients',{order:'name.asc',select:'name,profile'},getSbKey()).then(function(r){setClients((r||[]).map(function(c){return c.name;}));}).catch(function(e){console.error(e);});
    }
  },[view,detailClient,sbKey]);

  // Load client detail
  useEffect(function(){
    if(detailClient&&!detailData){loadDetail(detailClient);}
  },[detailClient,sbKey]);

  async function loadDetail(name){
    setDetailLoading(true);
    var key=getSbKey();
    try{
      var cls=await sbGet('clients',{'name':'eq.'+name,'limit':'1'},key);
      if(!cls||!cls.length){setDetailLoading(false);return;}
      var cl=cls[0];
      var sess=await sbGet('sessions',{'client_id':'eq.'+cl.id,'order':'created_at.asc'},key);
      var ghosts=await sbGet('ghost_items',{'client_id':'eq.'+cl.id,'resolved':'eq.false'},key);
      var bizzes=await sbGet('businesses',{'client_id':'eq.'+cl.id,'order':'created_at.asc'},key);
      var data={id:cl.id,profile:cl.profile||{},openItems:(ghosts||[]).map(function(g){return g.summary;}),
        sessions:(sess||[]).map(function(s){return {id:s.id,date:s.meeting_date,meetingType:s.meeting_type,attendees:s.attendees,summary:s.summary,notesAndQuestions:s.notes_and_questions,clientNextSteps:s.client_next_steps,mtsTasks:s.mts_tasks,nextAgenda:s.next_agenda,followUpEmail:s.follow_up_email,flags:s.flags,ghostItems:s.ghost_items};})};
      setDetailData(data);
      setDetailBizzes(bizzes||[]);
      setProfileDraft(data.profile||{});
      // Auto-generate profile if sparse
      var p=data.profile||{};
      var hasInfo=p.notes||(p.businesses&&p.businesses.length>0)||(p.serviceType&&p.serviceType!=='Unknown');
      if(!hasInfo&&data.sessions&&data.sessions.length>0){
        setGeneratingProfile(true);
        runProfileGen(name,data,apiKey).then(function(generated){
          if(!generated) return;
          var merged=Object.assign({},p);
          Object.entries(generated).forEach(function(kv){var k=kv[0],v=kv[1];if(!merged[k]||merged[k]==='Unknown'||merged[k]===''||(Array.isArray(merged[k])&&merged[k].length===0))merged[k]=v;});
          var ss=data.sessions||[];if(ss.length)merged.lastMeetingDate=ss[ss.length-1].date||'';
          return sbPatch('clients',{profile:merged},{id:cl.id},key).then(function(){
            setDetailData(function(prev){return Object.assign({},prev,{profile:merged});});
            setProfileDraft(merged);
          });
        }).catch(function(e){console.error(e);}).finally(function(){setGeneratingProfile(false);});
      }
    }catch(e){console.error(e);}
    setDetailLoading(false);
  }

  async function handleProcess(){
    if(!transcript.trim()) return;
    setStatus('loading');setErrorMsg('');
    try{
      // Try to find existing client for context
      var parsed=await runAgent(transcript,null,apiKey);
      setResult(parsed);setCheckedC([]);setCheckedM([]);
      var cn=parsed.clientName;
      // Upsert client
      var existing=await sbGet('clients',{'name':'eq.'+cn,'limit':'1'},key);
      var clientId;
      var oldProfile={};
      if(existing&&existing.length){
        clientId=existing[0].id;
        oldProfile=existing[0].profile||{};
      } else {
        var nc=await sbPost('clients',{name:cn,profile:{},open_items:[]},key);
        clientId=nc.id;
      }
      // Merge profile
      var np=parsed.clientProfile||{};
      var merged=Object.assign({},oldProfile);
      Object.entries(np).forEach(function(kv){var k=kv[0],v=kv[1];if(v&&v!=='Unknown'&&v!==''&&!(Array.isArray(v)&&v.length===0))merged[k]=v;});
      // Insert session
      var session=await sbPost('sessions',{
        client_id:clientId,client_name:cn,
        meeting_date:parsed.meetingDate||new Date().toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'}),
        meeting_type:parsed.meetingType,attendees:parsed.attendees,hosted_by:'Momen Tax Services',
        summary:parsed.summary,notes_and_questions:parsed.notesAndQuestions||[],
        client_next_steps:parsed.clientNextSteps||[],mts_tasks:parsed.mtsTasks||[],
        next_agenda:parsed.nextAgenda||[],follow_up_email:parsed.followUpEmail,
        flags:parsed.flags||[],ghost_items:parsed.ghostItems||[]
      },key);
      merged.lastMeetingDate=parsed.meetingDate||new Date().toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'});
      await sbPatch('clients',{profile:merged,updated_at:new Date().toISOString()},{id:clientId},key);
      setStatus('done');nav('result');
      setTimeout(function(){resultRef.current&&resultRef.current.scrollIntoView({behavior:'smooth'});},80);
    }catch(e){console.error(e);setErrorMsg(e.message||'Something went wrong.');setStatus('error');}
  }

  async function handleSaveProfile(){
    if(!detailClient||!detailData) return;
    try{
      await sbPatch('clients',{profile:profileDraft},{id:detailData.id},getSbKey());
      setDetailData(function(p){return Object.assign({},p,{profile:profileDraft});});
      setEditingProfile(false);
    }catch(e){alert('Error saving: '+e.message);}
  }

  async function handleSaveName(){
    var newName=nameDraft.trim();
    if(!newName||newName===detailClient){setEditingName(false);return;}
    try{
      await sbPatch('clients',{name:newName},{id:detailData.id},getSbKey());
      await sbPatch('sessions',{client_name:newName},{client_name:detailClient},getSbKey());
      setEditingName(false);
      navClient(newName,Object.assign({},detailData));
      setDetailClientSS(newName);
    }catch(e){alert('Error renaming: '+e.message);}
  }

  async function handleDeleteClient(){
    if(!confirm('Delete all data for '+detailClient+'?')) return;
    try{
      await sbDelete('clients',{id:detailData.id},getSbKey());
      setDetailClient('');setDetailClientSS('');setDetailData(null);
      nav('clients');
    }catch(e){alert('Error: '+e.message);}
  }

  async function handleSaveSession(updated,realIndex){
    try{
      if(updated.id){

    }catch(e){alert('Error deleting session: '+e.message);}
  }

    try{

      setDetailBizzes(function(prev){return prev.map(function(b){return b.id===biz.id?(updated&&updated[0]?updated[0]:biz):b;});});
    }catch(e){alert('Error saving business: '+e.message);}
  }

  async function handleDeleteBiz(bizId){
    try{

      setDetailBizzes(function(prev){return prev.filter(function(b){return b.id!==bizId;});});
    }catch(e){alert('Error: '+e.message);}
  }

                })
              ),
              h(Btn,{onClick:handleAddBiz,disabled:!newBiz.name.trim()},'Add Business')
            ),
            detailBizzes.length===0&&!addingBiz?h('div',{style:{color:C.muted,fontSize:13,fontStyle:'italic',padding:'8px 0'}},'No businesses linked yet.')
            :detailBizzes.map(function(biz){
              return h(BusinessCard,{key:biz.id,biz:biz,
                onSave:handleSaveBiz,
                onDelete:function(){if(confirm('Delete '+biz.name+'?'))handleDeleteBiz(biz.id);}
              });
            })
          ),

          // Sessions
          h('div',{style:{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:14}},
            h('div',{style:{color:C.muted,fontSize:11,fontWeight:700,letterSpacing:'0.08em'}},'SESSION HISTORY'),
            h('div',{style:{color:C.muted,fontSize:11}},'Click to expand/collapse')
          ),
          (detailData.sessions||[]).slice().reverse().map(function(s,i,arr){
            var realIndex=(detailData.sessions.length-1)-i;
            return h(SessionCard,{key:i,session:s,index:i,total:arr.length,clientName:detailClient,
              onSave:function(updated){handleSaveSession(updated,realIndex);},
              onDelete:function(){handleDeleteSession(s,realIndex);}
            });
          })
        )
      )
    )
  );

  async function handleBuildAgenda(){
    if(!agendaClient.trim()) return;
    setAgendaLoading(true);setAgendaResult('');
    try{
      var cls=await sbGet('clients',{name:'eq.'+agendaClient,limit:'1'},getSbKey());
      var history=null;
      if(cls&&cls.length){
        var cl=cls[0];
        var sess=await sbGet('sessions',{client_id:'eq.'+cl.id,order:'created_at.desc',limit:'3'},getSbKey());
        var gh=await sbGet('ghost_items',{client_id:'eq.'+cl.id,resolved:'eq.false',limit:'10'},getSbKey());
        history={profile:cl.profile||{},sessions:(sess||[]).map(function(s){return {date:s.meeting_date,summary:s.summary,nextAgenda:s.next_agenda};}),openItems:(gh||[]).map(function(g){return g.summary;})};
      }
      setAgendaResult(await runAgenda(agendaClient,history,apiKey));
    }catch(e){setAgendaResult('Error: '+e.message);}
    setAgendaLoading(false);
  }
}

ReactDOM.createRoot(document.getElementById('root')).render(h(App,null));
</script>
</body>
</html>
